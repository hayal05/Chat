{% extends "base.html" %}
{% block title %}Edit profile · Ethiogram{% endblock %}
{% block content %}
<div class="auth-card" style="margin:0 auto;">
  <div class="auth-logo">
    <img src="{{ current_user.avatar_url() }}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;">
    <div class="name">Edit your profile</div>
  </div>
  <form method="POST" enctype="multipart/form-data">
    <div class="field">
      <label>Profile picture</label>
      <input type="file" name="profile_pic" accept="image/*">
    </div>
    <div class="field">
      <label>Full name</label>
      <input type="text" name="full_name" value="{{ current_user.full_name }}">
    </div>
    <div class="field">
      <label>Bio</label>
      <input type="text" name="bio" value="{{ current_user.bio or '' }}" maxlength="280" placeholder="Tell people about yourself">
    </div>
    <button class="btn btn-primary" type="submit">Save changes</button>
  </form>
</div>
{% endblock %}
