{% extends "base.html" %}
{% block title %}Home · Sabina{% endblock %}
{% block content %}
<div class="page">

  {% include "_composer.html" %}

  {% if posts %}
    {% for post in posts %}
      {% include "_post.html" %}
    {% endfor %}
  {% else %}
    <div class="card empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/></svg>
      <h3>No posts yet</h3>
      <p>Be the first to share something with Sabina!</p>
    </div>
  {% endif %}

</div>
{% endblock %}
