{% extends "base.html" %}
{% block title %}Log in · Ethiogram{% endblock %}
{% block wrap_class %}auth-shell{% endblock %}
{% block content %}
<div class="weave-bg"></div>
<div class="auth-card">
  <div class="auth-logo">
    <span class="weave-mark">
      <svg width="40" height="40" viewBox="0 0 64 64"><g fill="none" stroke="#0B3D2E" stroke-width="4"><path d="M32 6 L58 32 L32 58 L6 32 Z"/><path d="M32 20 L44 32 L32 44 L20 32 Z"/></g></svg>
    </span>
    <div class="name">Ethiogram</div>
    <div class="tag">message freely</div>
  </div>

  <form method="POST">
    <div class="field">
      <label>Username, phone, or email</label>
      <input type="text" name="identifier" placeholder="e.g. abel or you@mail.com" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button class="btn btn-primary" type="submit">Log in</button>
  </form>

  <div class="auth-switch">New here? <a href="{{ url_for('register') }}">Create an account</a></div>
</div>
{% endblock %}
