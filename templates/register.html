{% extends "base.html" %}
{% block title %}Sign up · Sabina{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">S</div>
      <h1>Join Sabina</h1>
      <p>Connect with friends and share your moments.</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="e.g. sabina_rose"
               value="{{ username or '' }}" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com"
               value="{{ email or '' }}" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
