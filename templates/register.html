{% extends "base.html" %}
{% block title %}Sign up · Ethiogram{% endblock %}
{% block wrap_class %}auth-shell{% endblock %}
{% block content %}
<div class="weave-bg"></div>
<div class="auth-card">
  <div class="auth-logo">
    <span class="weave-mark">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Ethiogram" class="auth-logo-img">
    </span>
    <div class="name">Ethiogram</div>
    <div class="tag">create your account</div>
  </div>

  <form method="POST">
    <div class="field">
      <label>Full name</label>
      <input type="text" name="full_name" placeholder="Abel Tesfaye" autofocus>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="abel" required>
    </div>
    <div class="field">
      <label>Phone or email</label>
      <input type="text" name="contact" placeholder="+251 9xx xxx xxx or you@mail.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="At least 6 characters" required>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" name="confirm" placeholder="Retype password" required>
    </div>
    <button class="btn btn-primary" type="submit">Create account</button>
  </form>

  <div class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
</div>
{% endblock %}
